<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Scene</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .letter-colors {
            color: #5d47bb !important;
        }
        
        #canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 10;
        }
        
        #sige-text {
            position: absolute;
            top: 47%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18rem;
            font-weight: 900;
            color: rgba(0,0,0, 1);
            letter-spacing: 0.5rem;
            z-index: 1;
            pointer-events: none;
            user-select: none;
        }
        
        #question-text {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: 700;
            color: white;
            mix-blend-mode: difference;
            z-index: 20;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <div id="question-text">¿Alguna pregunta?</div>
    <div id="sige-text">S<span class="letter-colors">I</span>GE</div>
    <div id="canvas-container"></div>
    
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
        
        // Scene setup
        const scene = new THREE.Scene();
        
        // Camera setup
        const camera = new THREE.PerspectiveCamera(
            45,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(0, 0, 2.5);
        
        // Renderer setup
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true,
            alpha: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        // Lighting setup (Rembrandt preset simulation)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        
        // Central point light - ultra bright
        const centerLight = new THREE.PointLight(0xffffff, 25, 25);
        centerLight.position.set(0, 0.5, 2);
        scene.add(centerLight);
        
        // Secondary point light from different angle - very bright
        const sideLight = new THREE.PointLight(0xffffff, 20, 25);
        sideLight.position.set(-2, 1, 1);
        scene.add(sideLight);
        
        const keyLight = new THREE.DirectionalLight(0xffffff, 2);
        keyLight.position.set(0, 5, 5);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.width = 2048;
        keyLight.shadow.mapSize.height = 2048;
        keyLight.shadow.camera.near = 0.5;
        keyLight.shadow.camera.far = 50;
        keyLight.shadow.camera.left = -5;
        keyLight.shadow.camera.right = 5;
        keyLight.shadow.camera.top = 5;
        keyLight.shadow.camera.bottom = -5;
        scene.add(keyLight);
        
        const fillLight = new THREE.DirectionalLight(0xffffff, 0.5);
        fillLight.position.set(-5, 0, -5);
        scene.add(fillLight);
        
        const backLight = new THREE.DirectionalLight(0xffffff, 1);
        backLight.position.set(0, 5, -5);
        scene.add(backLight);
        
        // Add ground plane to receive shadows
        const planeGeometry = new THREE.PlaneGeometry(20, 20);
        const planeMaterial = new THREE.ShadowMaterial({ opacity: 0.3 });
        const plane = new THREE.Mesh(planeGeometry, planeMaterial);
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = -0.5;
        plane.receiveShadow = true;
        scene.add(plane);
        
        // Model container groups
        const wrapperGroup = new THREE.Group();
        const containerGroup = new THREE.Group();
        wrapperGroup.add(containerGroup);
        scene.add(wrapperGroup);
        
        // Mouse tracking
        const mousePosition = { x: 0, y: 0 };
        
        // Listen for mouse position from parent window
        window.addEventListener('message', (event) => {
            if (event.data.type === 'mousemove') {
                mousePosition.x = event.data.x;
                mousePosition.y = event.data.y;
            }
        });
        
        // Fallback: also listen to mousemove within iframe
        window.addEventListener('mousemove', (event) => {
            mousePosition.x = (event.clientX / window.innerWidth) * 2 - 1;
            mousePosition.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });
        
        // Setup DRACO loader - use local in development, CDN in production
        const dracoLoader = new DRACOLoader();
        const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const dracoPath = isLocalhost 
            ? '/node_modules/three/examples/jsm/libs/draco/gltf/'
            : 'https://www.gstatic.com/draco/versioned/decoders/1.5.6/';
        dracoLoader.setDecoderPath(dracoPath);
        
        // Load GLTF model
        const loader = new GLTFLoader();
        loader.setDRACOLoader(dracoLoader);
        let modelLoaded = false;
        
        // Load from local public folder
        const modelPath = '/head.glb';
        
        loader.load(
            modelPath,
            (gltf) => {
                const model = gltf.scene;
                model.rotation.y = Math.PI * -0.5;
                
                // Enable shadows for the model
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                
                containerGroup.add(model);
                modelLoaded = true;
            },
            (progress) => {
                // console.log('Loading progress:', (progress.loaded / progress.total * 100) + '%');
            },
            (error) => {
                console.error('Error loading model:', error);
                // Fallback: create a simple geometry if model fails to load
                const geometry = new THREE.IcosahedronGeometry(0.5, 1);
                const material = new THREE.MeshStandardMaterial({ 
                    color: 0x5d47bb,
                    metalness: 0.5,
                    roughness: 0.5
                });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.rotation.y = Math.PI * -0.5;
                containerGroup.add(mesh);
                modelLoaded = true;
            }
        );
        
        // Animation variables
        const clock = new THREE.Clock();
        const frequency = 2;
        const amplitude = 0.15;
        const verticalOffset = 0.19;
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            if (modelLoaded) {
                const elapsedTime = clock.getElapsedTime();
                
                // Floating animation
                containerGroup.position.y = 
                    Math.sin(elapsedTime * frequency) * amplitude + verticalOffset;
                
                // Mouse follow with lerp (smooth interpolation)
                containerGroup.rotation.y = THREE.MathUtils.lerp(
                    containerGroup.rotation.y,
                    mousePosition.x * (Math.PI / 4),
                    0.035
                );
                
                containerGroup.rotation.x = THREE.MathUtils.lerp(
                    containerGroup.rotation.x,
                    -mousePosition.y * (Math.PI / 7),
                    0.035
                );
                
                containerGroup.rotation.z = THREE.MathUtils.lerp(
                    containerGroup.rotation.z,
                    -mousePosition.y * (Math.PI / 20),
                    0.035
                );
            }
            
            renderer.render(scene, camera);
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Start animation
        animate();
    </script>
</body>
</html>
